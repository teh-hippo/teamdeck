<!DOCTYPE html>
<html>
	<head lang="en">
		<title>TeamDeck</title>
		<meta charset="utf-8" />
		<style>
			body {
				font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
				font-size: 12px;
				color: #dcdcdc;
				background: #2d2d2d;
				margin: 0;
				padding: 14px;
			}
			.status {
				line-height: 1.9;
				margin-bottom: 12px;
			}
			.dot {
				display: inline-block;
				width: 8px;
				height: 8px;
				border-radius: 50%;
				margin-right: 7px;
				vertical-align: middle;
			}
			.ok { background: #2ea043; }
			.bad { background: #d13438; }
			.warn { background: #e3a008; }
			button {
				background: #4a4a4a;
				color: #fff;
				border: 1px solid #666;
				border-radius: 4px;
				padding: 7px 12px;
				cursor: pointer;
			}
			button:hover { background: #585858; }
			.hint { color: #9a9a9a; margin-top: 12px; line-height: 1.5; }
		</style>
	</head>
	<body>
		<div class="status" id="status">Connecting&hellip;</div>
		<button id="repair">Re-pair with Teams</button>
		<div class="hint">
			If a key stays grey while you are in a meeting, click Re-pair and approve the prompt in Teams.
		</div>
		<script>
			let ws;
			let piContext;
			let actionUuid;

			function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
				piContext = uuid;
				try {
					actionUuid = JSON.parse(actionInfo).action;
				} catch (e) {
					/* no action context */
				}
				ws = new WebSocket("ws://127.0.0.1:" + port);
				ws.onopen = () => ws.send(JSON.stringify({ event: registerEvent, uuid }));
				ws.onmessage = (e) => {
					const msg = JSON.parse(e.data);
					if (msg.event === "sendToPropertyInspector") {
						render(msg.payload);
					}
				};
			}

			function render(p) {
				if (!p) return;
				const row = (cls, label) => '<span class="dot ' + cls + '"></span>' + label;
				document.getElementById("status").innerHTML = [
					row(p.connected ? "ok" : "bad", p.connected ? "Connected to Teams" : "Not connected"),
					row(p.paired ? "ok" : "warn", p.paired ? "Paired" : "Not paired"),
					row(p.inMeeting ? "ok" : "warn", p.inMeeting ? "In a meeting" : "Not in a meeting"),
				].join("<br>");
			}

			document.getElementById("repair").addEventListener("click", () => {
				if (ws && actionUuid) {
					ws.send(
						JSON.stringify({
							action: actionUuid,
							event: "sendToPlugin",
							context: piContext,
							payload: { type: "repair" },
						}),
					);
				}
			});
		</script>
	</body>
</html>
