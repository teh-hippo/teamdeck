<!DOCTYPE html>
<html>
	<head lang="en">
		<title>TeamDeck</title>
		<meta charset="utf-8" />
		<style>
			body {
				font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
				font-size: 12px;
				color: #dcdcdc;
				background: #2d2d2d;
				margin: 0;
				padding: 14px;
			}
			.hint { color: #9a9a9a; margin-top: 12px; line-height: 1.5; }
			.opt { margin-top: 14px; padding-top: 12px; border-top: 1px solid #444; }
			.opt label { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
			.opt input { margin-top: 2px; }
			.opt .desc { color: #9a9a9a; line-height: 1.5; margin-top: 4px; }
			.opt .desc a { color: #4aa3ff; }
		</style>
	</head>
	<body>
		<div class="hint">
			Status tiles mirror your meeting without disturbing the active window. Pressing a control
			key briefly brings Teams forward, then returns focus to where you were.
		</div>
		<div class="opt" id="optIn" style="display: none">
			<label>
				<input type="checkbox" id="allowLogReading" onchange="onToggleLogReading(this.checked)" />
				<span>
					Allow reading status via Teams logs
					<div class="desc">
						Your status is read from the local Teams log file.
						<a href="#" onclick="openProof(event)">No other data is read.</a>
					</div>
				</span>
			</label>
		</div>
		<script>
			let ws;
			let piUuid;
			let globalSettings = {};
			const AVAILABILITY = "io.github.teh-hippo.teamdeck.availability";
			const SOURCE_URL =
				"https://github.com/teh-hippo/teamdeck/blob/main/native/src/main.rs#L407-L425";

			function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
				piUuid = uuid;
				let action;
				try { action = JSON.parse(actionInfo).action; } catch { action = undefined; }
				if (action === AVAILABILITY) document.getElementById("optIn").style.display = "block";
				ws = new WebSocket("ws://127.0.0.1:" + port);
				ws.onopen = () => {
					ws.send(JSON.stringify({ event: registerEvent, uuid }));
					ws.send(JSON.stringify({ event: "getGlobalSettings", context: uuid }));
				};
				ws.onmessage = (e) => {
					const msg = JSON.parse(e.data);
					if (msg.event === "didReceiveGlobalSettings") {
						applyGlobalSettings(msg.payload && msg.payload.settings);
					}
				};
			}

			function applyGlobalSettings(settings) {
				globalSettings = settings || {};
				const cb = document.getElementById("allowLogReading");
				if (cb) cb.checked = globalSettings.allowLogReading === true;
			}

			function onToggleLogReading(checked) {
				globalSettings = Object.assign({}, globalSettings, { allowLogReading: checked });
				ws.send(JSON.stringify({ event: "setGlobalSettings", context: piUuid, payload: globalSettings }));
			}

			function openProof(e) {
				e.preventDefault();
				ws.send(JSON.stringify({ event: "openUrl", payload: { url: SOURCE_URL } }));
			}
		</script>
	</body>
</html>
