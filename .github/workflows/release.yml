name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: native
      - name: Verify the tag matches the source versions
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TAG3="$(echo "$TAG" | cut -d. -f1-3)"
          PKG="$(node -p "require('./package.json').version")"
          CARGO="$(sed -n 's/^version *= *"\(.*\)"/\1/p' native/Cargo.toml | head -1)"
          echo "tag=$TAG (semver $TAG3)  package.json=$PKG  native/Cargo.toml=$CARGO"
          rc=0
          [ "$TAG3" = "$PKG" ]   || { echo "::error::tag semver $TAG3 does not match package.json $PKG"; rc=1; }
          [ "$TAG3" = "$CARGO" ] || { echo "::error::tag semver $TAG3 does not match native/Cargo.toml $CARGO"; rc=1; }
          exit $rc
      - run: npm ci
      - run: npm run proof
      - name: Derive plugin version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "value=${TAG}.0" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "value=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "Tag '$GITHUB_REF_NAME' is not a numeric Stream Deck version (a.b.c or a.b.c.d)." >&2
            exit 1
          fi
      - name: Pack the plugin (builds and bundles the helper)
        run: npm run pack -- --output dist --version "${{ steps.version.outputs.value }}" --no-update-check --force
      - name: Smoke-test the bundled helper (one snapshot, exit 0)
        shell: pwsh
        run: |
          $out = & io.github.teh-hippo.teamdeck.sdPlugin/bin/teamdeck-helper.exe
          if ($LASTEXITCODE -ne 0) { throw "helper exited with $LASTEXITCODE" }
          if ($null -eq ($out | ConvertFrom-Json).schema) { throw "helper did not emit a snapshot" }
          Write-Host "helper smoke ok"
      - name: Verify the packaged plugin contains the helper
        shell: pwsh
        run: |
          $pkg = Get-ChildItem dist/*.streamDeckPlugin | Select-Object -First 1
          if (-not $pkg) { throw "no .streamDeckPlugin produced" }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($pkg.FullName)
          try {
            $entry = $zip.Entries | Where-Object { $_.FullName -like "*/bin/teamdeck-helper.exe" }
            if (-not $entry) { throw "packaged plugin is missing bin/teamdeck-helper.exe" }
            if ($entry.Length -le 0) { throw "the bundled helper is empty" }
            Write-Host "packaged helper ok: $($entry.FullName) ($($entry.Length) bytes)"
          } finally {
            $zip.Dispose()
          }
      - name: Publish SHA256 checksums
        shell: pwsh
        run: |
          Get-ChildItem dist/*.streamDeckPlugin | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash, $_.Name
          } | Set-Content dist/SHA256SUMS.txt
          Get-Content dist/SHA256SUMS.txt
      - name: Attest build provenance for the plugin
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.streamDeckPlugin
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            dist/*.streamDeckPlugin
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
          # release-please owns the GitHub Release and its changelog notes; this
          # step only attaches the packaged assets, so it must not regenerate them.
          generate_release_notes: false
