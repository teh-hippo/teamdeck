name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run proof

  helper:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: native
      - name: Check Rust formatting
        working-directory: native
        run: cargo fmt --check
      - name: Lint the helper with clippy
        working-directory: native
        run: cargo clippy --release -- -D warnings
      - name: Run the helper unit tests
        working-directory: native
        run: cargo test
      - name: Build and bundle the native helper
        run: npm run build:helper
      - name: Smoke-test the helper (one snapshot, exit 0)
        shell: pwsh
        run: |
          $out = & io.github.teh-hippo.teamdeck.sdPlugin/bin/teamdeck-helper.exe
          if ($LASTEXITCODE -ne 0) { throw "helper exited with $LASTEXITCODE" }
          $snap = $out | ConvertFrom-Json
          if ($null -eq $snap.schema) { throw "helper did not emit a snapshot" }
          Write-Host "helper smoke ok: schema=$($snap.schema) teamsRunning=$($snap.teamsRunning)"

  machete:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Check for unused Rust dependencies
        run: |
          cargo install cargo-machete --locked
          cargo machete native

  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory: unused files/exports/deps are reported but do not fail the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Report unused files, exports and dependencies
        run: npx --yes knip@5
