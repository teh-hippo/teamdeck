name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 18 * * 2"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, rust]
    uses: teh-hippo/common-repo-configs/.github/workflows/codeql.yml@b3d0a782aa320db32e090a312e42e8da717e29b5 # v1
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      language: ${{ matrix.language }}
