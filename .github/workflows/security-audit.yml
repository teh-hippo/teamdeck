name: Security Audit

on:
  push:
    branches: [main]
    paths: ["native/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: teh-hippo/common-repo-configs/.github/workflows/security-audit.yml@3d8fb0045df6c146324d6e8ac6485c6116782a05  # v3.1.0
    permissions:
      contents: read
      issues: write
      checks: write
    with:
      working-directory: native
