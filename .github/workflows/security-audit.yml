name: Security Audit

on:
  push:
    branches: [main]
    paths: ["native/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: teh-hippo/common-repo-configs/.github/workflows/security-audit.yml@b3d0a782aa320db32e090a312e42e8da717e29b5 # v1
    permissions:
      contents: read
      issues: write
      checks: write
    with:
      working-directory: native
