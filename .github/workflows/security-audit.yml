name: Security Audit

on:
  push:
    branches: [main]
    paths: ["native/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: teh-hippo/common-repo-configs/.github/workflows/security-audit.yml@0ea3db6a0768a59f7fc8a5dfa3f79d885fd80895  # v3.0.1
    permissions:
      contents: read
      issues: write
      checks: write
    with:
      working-directory: native
