name: Security Audit

on:
  push:
    branches: [main]
    paths: ["native/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: teh-hippo/common-repo-configs/.github/workflows/security-audit.yml@5ee35e8b64328a970f0a85b963147b2b7e351886  # v2
    permissions:
      contents: read
      issues: write
      checks: write
    with:
      working-directory: native
