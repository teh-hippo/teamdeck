name: Security Audit

on:
  push:
    branches: [main]
    paths: ["native/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: teh-hippo/common-repo-configs/.github/workflows/security-audit.yml@2a1423750ab58fdbe2ce21d35f583f07c79fcdc8  # v2.0.3
    permissions:
      contents: read
      issues: write
      checks: write
    with:
      working-directory: native
