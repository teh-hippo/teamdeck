name: Security Audit

on:
  push:
    branches: [main]
    paths: ["native/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: teh-hippo/common-repo-configs/.github/workflows/security-audit.yml@a09e52c265474981aa190ed3997bdc59e7e7ed56  # v3.0.0
    permissions:
      contents: read
      issues: write
      checks: write
    with:
      working-directory: native
