name: Security Audit

on:
  push:
    branches: [main]
    paths: ["native/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: teh-hippo/common-repo-configs/.github/workflows/security-audit.yml@962b691da7463ad73773f2a803a5ac2a1cdd1b46  # v2.0.1
    permissions:
      contents: read
      issues: write
      checks: write
    with:
      working-directory: native
