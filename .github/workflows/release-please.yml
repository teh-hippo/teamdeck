name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    uses: teh-hippo/common-repo-configs/.github/workflows/release-please.yml@a09e52c265474981aa190ed3997bdc59e7e7ed56  # v3.0.0
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
