name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    uses: teh-hippo/common-repo-configs/.github/workflows/release-please.yml@0ea3db6a0768a59f7fc8a5dfa3f79d885fd80895  # v3.0.1
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
