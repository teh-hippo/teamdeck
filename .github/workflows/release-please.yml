name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    uses: teh-hippo/common-repo-configs/.github/workflows/release-please.yml@5ee35e8b64328a970f0a85b963147b2b7e351886  # v2
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
