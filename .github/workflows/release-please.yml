name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    uses: teh-hippo/common-repo-configs/.github/workflows/release-please.yml@3d8fb0045df6c146324d6e8ac6485c6116782a05  # v3.1.0
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
