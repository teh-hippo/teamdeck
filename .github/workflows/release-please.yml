name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    uses: teh-hippo/common-repo-configs/.github/workflows/release-please.yml@962b691da7463ad73773f2a803a5ac2a1cdd1b46  # v2.0.1
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
